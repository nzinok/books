<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנתב הגהה חכם</title>
</head>
<body>
    <div style="font-family: sans-serif; text-align: center; margin-top: 50px; font-size: 20px;">
        מכין את הספר והחיפוש המדויק...
    </div>
    <script>
        // קריאת הפרמטרים הבטוחים שהגיעו מגוגל שיטס
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');
        const page = params.get('page');
        let search = params.get('search') || '';

        if (file && page) {
            // הקסם: מחזירים את המרכאות והגרשיים האמיתיים שהסתרנו מהשיטס
            search = search.replace(/_Q_/g, '"').replace(/_G_/g, '״');
            
            // בניית הקישור המלא והמאובטח למנוע של מוזילה, כולל חיפוש ביטוי מדויק
            const finalUrl = "web/viewer.html?file=../" + file + "#page=" + page + (search ? "&search=" + encodeURIComponent(search) + "&phrase=true" : "");
            
            // מעבר אוטומטי מיידי בתוך הדפדפן
            window.location.href = finalUrl;
        }
    </script>
</body>
</html>
